{% extends "base.html" %} {% block content %}
<div class="auth-card" style="max-width: 600px;">
    <h1>Новый пост</h1>

    <form method="POST" class="auth-form">
        <textarea name="body" rows="5" placeholder="Что у вас нового?" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e4e6eb; font-family: inherit; font-size: 1rem; resize: vertical;" maxlength="280" required></textarea>
        <div style="font-size: 0.8rem; color: var(--text-light); text-align: right; margin-top: 5px;">
            максимум 280 символов
        </div>
        <button type="submit" class="auth-btn" style="margin-top: 16px;">Опубликовать</button>
    </form>

    <div class="auth-footer">
        <a href="{{ url_for('feed') }}">← Назад к ленте</a>
    </div>
</div>
{% endblock %}
