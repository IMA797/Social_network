{% extends "base.html" %} {% block content %}
<h1>Поиск пользователей</h1>

<form method="POST" class="search-form">
    <input type="text" name="search" class="search-input" placeholder="Введите имя пользователя..." value="{{ request.form.get('search', '') }}">
    <button type="submit" class="search-btn">Найти</button>
</form>

{% if users %}
<div class="users-list">
    <h3>Результаты поиска:</h3>
    {% for user in users %}
    <div class="user-item">
        <div class="avatar small-avatar">
            {{ user.username[0]|upper }}
        </div>
        <div class="user-info">
            <div class="user-name">{{ user.username }}</div>
        </div>
        <a href="{{ url_for('chat', user_id=user.id) }}" class="start-chat-btn">Написать</a>
    </div>
    {% endfor %}
</div>
{% elif request.method == 'POST' %}
<p class="no-results">Пользователи не найдены</p>
{% endif %} {% endblock %}
